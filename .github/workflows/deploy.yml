name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy to lyhadt.github.io
        run: |
          git clone --depth 1 --branch master https://x-access-token:${{ secrets.GH_PAT }}@github.com/lyh-ADT/lyh-adt.github.io.git /tmp/pages
          rm -rf /tmp/pages/docs/markdown-editor
          mkdir -p /tmp/pages/docs/markdown-editor
          cp -r dist/* /tmp/pages/docs/markdown-editor/
          cd /tmp/pages
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/markdown-editor/
          git diff --cached --quiet || git commit -m "deploy: markdown-editor ${{ github.sha }}"
          git push origin master
